# tbl4-ai-stack — unified classroom stack.
#
# One compose file, three deployment profiles:
#   default (no profile flag) — local: Ollama runs on the host
#   --profile cloud           — Ollama runs as a container alongside the rest
#   --profile mcp             — adds the mcpo MCP→OpenAPI proxy
# Profiles compose; e.g. --profile cloud --profile mcp.
#
# Container_name is intentionally omitted everywhere so this stack can run
# alongside tbl4-local-llm and tbl4-n8n on the same host (compose namespaces
# objects by project name).

services:
  # ─── OpenWebUI ─────────────────────────────────────────────────────────────
  open-webui:
    # See https://github.com/open-webui/open-webui/releases/latest before bumping.
    image: ghcr.io/open-webui/open-webui:v0.9.1
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    volumes:
      - open-webui_data:/app/backend/data
    environment:
      # Local profile: host Ollama. Cloud profile overrides this to ollama:11434.
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # Auth is on so the login form works in fresh browser sessions.
      # WEBUI_AUTH=false drops users into a no-auth single-user mode, but
      # OpenWebUI refuses to honor that flag once any user exists in the
      # DB (which our stack-init seeding always produces) and the UI ends
      # up wedged. The seeded admin (tbl4@example.com) handles login.
      - WEBUI_AUTH=true
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ─── n8n-init ──────────────────────────────────────────────────────────────
  # One-shot seeder: substitutes the Ollama URL into the credential template,
  # imports it along with the starter workflows on a fresh volume, then exits.
  # Idempotent via a sentinel file. n8n waits for this to finish.
  n8n-init:
    image: docker.n8n.io/n8nio/n8n:2.18.2
    user: "node"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-init/credentials.tmpl.json:/tmp/credentials.tmpl.json:ro
      - ./templates/summarise-url.workflow.json:/tmp/workflows/summarise-url.workflow.json:ro
      - ./templates/mcp-tools.workflow.json:/tmp/workflows/mcp-tools.workflow.json:ro
    environment:
      - N8N_ENCRYPTION_KEY=tbl4-classroom-key-2026
      # Substituted into the credential at seed time. Default targets host
      # Ollama (local profile); cloud profile overrides this to ollama:11434.
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ -f /home/node/.n8n/.tbl4-seeded ]; then
          echo "already seeded; skipping"
          exit 0
        fi
        echo "seeding Ollama credential (baseUrl=$$OLLAMA_BASE_URL)..."
        sed "s|__OLLAMA_BASE_URL__|$$OLLAMA_BASE_URL|g" /tmp/credentials.tmpl.json > /tmp/credentials.json
        n8n import:credentials --input=/tmp/credentials.json
        echo "importing starter workflows..."
        n8n import:workflow --separate --input=/tmp/workflows/
        # Workflows land as drafts. The stack-init service activates them
        # via the n8n REST API once n8n is up — this gives clean webhook
        # URLs (no workflow-ID prefix) and a fully zero-click first run.
        touch /home/node/.n8n/.tbl4-seeded
        echo "done"
    restart: "no"

  # ─── n8n ───────────────────────────────────────────────────────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n:2.18.2
    depends_on:
      n8n-init:
        condition: service_completed_successfully
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      # Host-shared notes folder for exercises that write Markdown back out.
      - ./notes:/data/notes
    environment:
      - N8N_ENCRYPTION_KEY=tbl4-classroom-key-2026
      - GENERIC_TIMEZONE=America/New_York
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      - N8N_TEMPLATES_ENABLED=true
      - N8N_SECURE_COOKIE=false
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ─── stack-init ────────────────────────────────────────────────────────────
  # One-shot bootstrap: creates the n8n owner, activates the seeded workflows,
  # creates the OpenWebUI admin, and registers the Summarise URL tool — so the
  # first `docker compose up -d` lands on a fully working chain with zero
  # clicks. Idempotent: a sentinel in /state short-circuits re-runs.
  stack-init:
    image: python:3.12-alpine
    depends_on:
      n8n-init:
        condition: service_completed_successfully
      n8n:
        condition: service_started
      open-webui:
        condition: service_started
    volumes:
      - ./stack-init/init.py:/app/init.py:ro
      - ./openwebui-tools:/app/openwebui-tools:ro
      - stack_init_data:/state
    environment:
      - N8N_URL=http://n8n:5678
      - OWUI_URL=http://open-webui:8080
      - OWNER_EMAIL=tbl4@example.com
      - OWNER_PASSWORD=Tbl4-classroom-2026!
    entrypoint: ["python", "/app/init.py"]
    restart: "no"

  # ─── mcpo (mcp profile) ────────────────────────────────────────────────────
  # MCP-to-OpenAPI proxy. OpenWebUI's native MCP support is Streamable-HTTP
  # only; mcpo lets you bring stdio-based MCP servers into OpenWebUI by
  # exposing them as OpenAPI endpoints. Profile-gated because mcpo refuses
  # to start with an empty config — add at least one server to mcpo.config.json,
  # then `docker compose --profile mcp up -d`. Register each tool in OpenWebUI
  # under Admin Settings → External Tools using URLs like http://mcpo:8000/<name>.
  mcpo:
    profiles: ["mcp"]
    image: ghcr.io/open-webui/mcpo:latest
    command: ["--config", "/config/mcpo.config.json", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./mcpo.config.json:/config/mcpo.config.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ─── Ollama (cloud profile) ────────────────────────────────────────────────
  # Containerised Ollama for cloud / GPU-less / shared deployments. Locally
  # we prefer host-installed Ollama for native GPU/Metal acceleration; this
  # service only spins up when --profile cloud is passed.
  ollama:
    profiles: ["cloud"]
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    environment:
      # Memory tuning: flash attention reduces KV-cache footprint and speeds
      # up inference; q8_0 KV-cache quantisation roughly halves cache RAM at
      # negligible quality cost. Universally safe defaults.
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
    restart: unless-stopped

  # ─── ollama-init (cloud profile) ───────────────────────────────────────────
  # One-shot: pulls the configured model into the ollama service so the chain
  # has something to talk to. Pure curl — avoids re-using the ollama image's
  # entrypoint (which would try to start a second server).
  ollama-init:
    profiles: ["cloud"]
    image: curlimages/curl:8.10.1
    depends_on:
      ollama:
        condition: service_started
    environment:
      - MODEL=${MODEL:-mistral}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "waiting for ollama..."
        until curl -sf http://ollama:11434/api/tags >/dev/null; do sleep 2; done
        echo "pulling $$MODEL..."
        curl -sf -X POST http://ollama:11434/api/pull \
          -H "Content-Type: application/json" \
          -d "{\"name\": \"$$MODEL\"}" \
          --no-buffer | tail -c 200
        echo
        echo "done"
    restart: "no"

volumes:
  open-webui_data:
  n8n_data:
  stack_init_data:
  ollama_data:
